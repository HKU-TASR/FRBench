name: Publish Python package

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag and package versions
        run: |
          python - <<'PY'
          import ast
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              project_version = tomllib.load(handle)["project"]["version"]

          with open("frbench/_config.py", encoding="utf-8") as handle:
              tree = ast.parse(handle.read())
          package_version = next(
              ast.literal_eval(node.value)
              for node in tree.body
              if isinstance(node, ast.Assign)
              and any(
                  isinstance(target, ast.Name) and target.id == "__version__"
                  for target in node.targets
              )
          )

          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          versions = {
              "tag": tag_version,
              "pyproject.toml": project_version,
              "frbench/_config.py": package_version,
          }
          if len(set(versions.values())) != 1:
              raise SystemExit(f"Version mismatch: {versions}")
          print(f"Building frbench {tag_version}")
          PY

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/frbench/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/

      - name: Create GitHub release with dist assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract this version's section from the changelog for the notes.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "FRBench $VERSION" \
            --notes-file release-notes.md
